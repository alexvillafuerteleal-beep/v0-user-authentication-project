<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">TELMEX internet</title>
  <desc id="desc">Ilustracion de red e internet para servicio de conectividad</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#3730a3"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="45%">
      <stop offset="0" stop-color="#a5b4fc"/>
      <stop offset="1" stop-color="#6366f1"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <circle cx="400" cy="250" r="70" fill="url(#core)"/>
  <g fill="none" stroke="#c7d2fe" stroke-width="6" opacity="0.8">
    <circle cx="400" cy="250" r="130"/>
    <circle cx="400" cy="250" r="190"/>
  </g>
  <g fill="#e0e7ff">
    <circle cx="400" cy="250" r="10"/>
    <circle cx="270" cy="250" r="10"/>
    <circle cx="530" cy="250" r="10"/>
    <circle cx="400" cy="120" r="10"/>
    <circle cx="400" cy="380" r="10"/>
    <circle cx="305" cy="155" r="10"/>
    <circle cx="495" cy="345" r="10"/>
  </g>
  <g stroke="#a5b4fc" stroke-width="4" opacity="0.75">
    <line x1="400" y1="250" x2="270" y2="250"/>
    <line x1="400" y1="250" x2="530" y2="250"/>
    <line x1="400" y1="250" x2="400" y2="120"/>
    <line x1="400" y1="250" x2="400" y2="380"/>
    <line x1="400" y1="250" x2="305" y2="155"/>
    <line x1="400" y1="250" x2="495" y2="345"/>
  </g>
  <text x="36" y="470" fill="#eef2ff" font-family="Arial, sans-serif" font-size="44" font-weight="700">TELMEX</text>
</svg>
