<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sphereGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Glowing sphere -->
  <circle cx="100" cy="100" r="85" fill="url(#sphereGradient)" opacity="0.2" filter="url(#glow)"/>
  
  <!-- Circuit pattern -->
  <g stroke="#00d4aa" stroke-width="1.5" fill="none" opacity="0.6">
    <!-- Vertical lines -->
    <line x1="60" y1="50" x2="60" y2="150"/>
    <line x1="100" y1="40" x2="100" y2="160"/>
    <line x1="140" y1="50" x2="140" y2="150"/>
    
    <!-- Horizontal lines -->
    <line x1="50" y1="80" x2="150" y2="80"/>
    <line x1="50" y1="100" x2="150" y2="100"/>
    <line x1="50" y1="120" x2="150" y2="120"/>
    
    <!-- Diagonal connections -->
    <line x1="70" y1="60" x2="130" y2="140"/>
    <line x1="130" y1="60" x2="70" y2="140"/>
  </g>
  
  <!-- Connection nodes -->
  <g fill="#00d4aa" opacity="0.8">
    <circle cx="60" cy="80" r="3"/>
    <circle cx="100" cy="60" r="3"/>
    <circle cx="140" cy="80" r="3"/>
    <circle cx="60" cy="100" r="3"/>
    <circle cx="100" cy="100" r="4"/>
    <circle cx="140" cy="100" r="3"/>
    <circle cx="60" cy="120" r="3"/>
    <circle cx="100" cy="140" r="3"/>
    <circle cx="140" cy="120" r="3"/>
  </g>
  
  <!-- Glow nodes -->
  <g fill="#00d4aa" opacity="0.3" filter="url(#glow)">
    <circle cx="100" cy="100" r="8"/>
  </g>
  
  <!-- Letter P with $ symbol -->
  <g fill="#00d4aa" font-family="Arial, sans-serif" font-weight="bold">
    <text x="100" y="115" font-size="70" text-anchor="middle" fill="#00d4aa">P</text>
    <text x="125" y="95" font-size="28" text-anchor="middle" fill="#00d4aa">$</text>
  </g>
</svg>