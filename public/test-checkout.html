<!DOCTYPE html>
<html>
<head>
  <title>Test Stripe Checkout Session</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 40px auto; }
    .result { margin-top: 20px; padding: 10px; border-radius: 5px; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    pre { background: #f5f5f5; padding: 10px; border-radius: 3px; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>Test: /api/stripe/create-checkout-session</h1>
  
  <button onclick="testEndpoint()">Test Endpoint</button>
  <button onclick="clearResults()">Clear</button>

  <div id="results"></div>

  <script>
    async function testEndpoint() {
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '<p>Testing...</p>';

      try {
        const payload = {
          amount: 500,
          service: "Electricidad",
          serviceId: "cfe",
          paymentMethod: "card"
        };

        console.log("Sending:", payload);

        const response = await fetch("/api/stripe/create-checkout-session", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        console.log("Response status:", response.status);
        const text = await response.text();
        
        let data;
        try {
          data = JSON.parse(text);
        } catch (e) {
          data = { error: "Invalid JSON response", raw: text.substring(0, 200) };
        }

        const className = response.ok ? 'success' : 'error';
        const status = response.ok ? '✅ SUCCESS' : '❌ ERROR';

        resultsDiv.innerHTML = `
          <div class="result ${className}">
            <p><strong>${status}</strong></p>
            <p>Status: ${response.status} ${response.statusText}</p>
            <pre>${JSON.stringify(data, null, 2)}</pre>
          </div>
        `;
      } catch (err) {
        resultsDiv.innerHTML = `
          <div class="result error">
            <p><strong>❌ EXCEPTION</strong></p>
            <pre>${err.message}\n${err.stack}</pre>
          </div>
        `;
      }
    }

    function clearResults() {
      document.getElementById('results').innerHTML = '';
    }
  </script>
</body>
</html>
